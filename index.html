<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helpdesk System - Oracle Pharmacy</title>
    <link rel="stylesheet" href="./Helpdesk System_files/all.min.css">
    <link rel="stylesheet" href="./Helpdesk System_files/style.css">
    <style>
        /* Professional header styling */
        header {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            margin-bottom: 40px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .oracle-logo {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .oracle-logo svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }

        header h1 {
            color: #ffffff;
            font-size: 28px;
            margin: 0;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #ffffff;
            transition: all 0.3s ease;
        }

        .user-icon:hover {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .user-icon svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            fill: none;
        }

        /* Card icons styling */
        .card-icon {
            display: inline-block;
            width: 40px;
            height: 40px;
            margin-right: 15px;
            vertical-align: middle;
            flex-shrink: 0;
        }

        .card-icon svg {
            width: 100%;
            height: 100%;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.5;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 0;
        }

        /* Enhanced container styling */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .main-heading {
            text-align: center;
            color: #333;
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 30px;
        }

        /* Search container enhancement */
        .search-container {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }

        .search-container input {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .search-container input:focus {
            outline: none;
            border-color: #c74634;
            box-shadow: 0 0 0 3px rgba(199, 70, 52, 0.1);
        }

        /* Cards grid enhancement */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .dropdown-card {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            transition: all 0.3s ease;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .dropdown-card:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            border-color: #c74634;
            transform: translateY(-2px);
        }

        .dropdown-btn {
            padding: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #f8f8f8 0%, #ffffff 100%);
            transition: background 0.3s ease;
        }

        .dropdown-btn:hover {
            background: linear-gradient(135deg, #f0f0f0 0%, #f8f8f8 100%);
        }

        .dropdown-btn i {
            color: #c74634;
            font-size: 18px;
            transition: transform 0.3s ease;
        }

        .dropdown-card.active .dropdown-btn i {
            transform: rotate(180deg);
        }
    </style>
</head>
<body>
    <!-- Professional Header with Oracle Logo -->
    <header>
        <div class="header-left">
            <!-- Oracle Logo -->
            <div class="oracle-logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" aria-label="Oracle Logo">
                    <defs>
                        <linearGradient id="oracleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#c74634;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <!-- Oracle text -->
                    <text x="25" y="48" font-size="36" font-weight="bold" fill="url(#oracleGrad)" font-family="Arial, sans-serif" letter-spacing="2">ORACLE</text>
                    <!-- Decorative elements -->
                    <circle cx="180" cy="30" r="4" fill="url(#oracleGrad)"/>
                    <circle cx="190" cy="30" r="4" fill="url(#oracleGrad)"/>
                </svg>
            </div>
            <h1>Helpdesk System</h1>
        </div>
        <div class="header-right">
            <!-- User Profile Icon -->
            <div class="user-icon" title="User Profile">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
        </div>
    </header>

    <div class="container">
        <h2 class="main-heading">How can we help you today?</h2>
        
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search documentation, guides, and procedures...">
        </div>
        
        <div class="cards-grid">
            <!-- Working Instructions Card -->
            <div class="dropdown-card" data-category="Working Instructions">
                <div class="dropdown-btn">
                    <div class="card-title">
                        <span class="card-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="12" y1="13" x2="8" y2="13"></line>
                                <line x1="12" y1="17" x2="8" y2="17"></line>
                            </svg>
                        </span>
                        <span>Working Instructions</span>
                    </div>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>

            <!-- Standard Operating Procedures Card -->
            <div class="dropdown-card" data-category="SOPs">
                <div class="dropdown-btn">
                    <div class="card-title">
                        <span class="card-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="9" y1="9" x2="15" y2="9"></line>
                                <line x1="9" y1="13" x2="15" y2="13"></line>
                                <line x1="9" y1="17" x2="13" y2="17"></line>
                            </svg>
                        </span>
                        <span>Standard Operating Procedures</span>
                    </div>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>

            <!-- Functional Specifications Card -->
            <div class="dropdown-card" data-category="Functional Specifications">
                <div class="dropdown-btn">
                    <div class="card-title">
                        <span class="card-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M12 2v20M2 12h20"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                                <circle cx="19" cy="5" r="2"></circle>
                                <circle cx="5" cy="19" r="2"></circle>
                            </svg>
                        </span>
                        <span>Functional Specifications</span>
                    </div>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>

            <!-- Templates Card -->
            <div class="dropdown-card" data-category="Templates">
                <div class="dropdown-btn">
                    <div class="card-title">
                        <span class="card-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
                                <rect x="3" y="3" width="7" height="7"></rect>
                                <rect x="14" y="3" width="7" height="7"></rect>
                                <rect x="14" y="14" width="7" height="7"></rect>
                                <rect x="3" y="14" width="7" height="7"></rect>
                            </svg>
                        </span>
                        <span>Templates</span>
                    </div>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Card expansion functionality
        document.querySelectorAll('.dropdown-card').forEach(card => {
            card.addEventListener('click', function() {
                this.classList.toggle('active');
            });
        });

        // Search functionality
        document.getElementById('searchInput').addEventListener('keyup', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            document.querySelectorAll('.dropdown-card').forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = text.includes(searchTerm) ? 'block' : 'none';
            });
        });
    </script>
</body>
</html>
