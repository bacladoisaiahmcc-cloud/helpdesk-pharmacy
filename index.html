<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helpdesk System</title>
    <link rel="stylesheet" href="./Helpdesk System_files/all.min.css">
    <link rel="stylesheet" href="./Helpdesk System_files/style.css">
</head>
<body>
    <div class="container">
        <h1>How can we help you today?</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search...">
        </div>
        
        <div class="cards-grid">
            <div class="dropdown-card" data-category="Working Instructions">
                <div class="dropdown-btn">
                    <div class="card-title">
                        <img src="./Helpdesk System_files/working_instructions_icon.png" alt="">
                        Working Instructions
                    </div>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>

            <div class="dropdown-card" data-category="SOPs">
                <div class="dropdown-btn">
                    <div class="card-title">
                        <img src="./Helpdesk System_files/sop_icon.png" alt="">
                        Standard Operating Procedures
                    </div>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>

            <div class="dropdown-card" data-category="Functional Specifications">
                <div class="dropdown-btn">
                    <div class="card-title">
                        <img src="./Helpdesk System_files/specs_icon.png" alt="">
                        Functional Specifications
                    </div>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>

            <div class="dropdown-card" data-category="Templates">
                <div class="dropdown-btn">
                    <div class="card-title">
                        <img src="./Helpdesk System_files/templates_icon.png" alt="">
                        Templates
                    </div>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
