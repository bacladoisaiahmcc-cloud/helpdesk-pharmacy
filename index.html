<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oracle Pharmacy Helpdesk</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    :root { --oracle-blue: #234e70; --oracle-red: #f80000; --bg: #f4f7f9; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); }

    /* FIXED HEADER: High Visibility for Login */
    .header { 
      background-color: var(--oracle-blue); 
      color: white; 
      padding: 30px 5%; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      border-bottom: 4px solid var(--oracle-red);
      position: sticky; top: 0; z-index: 1000;
    }
    .header-left { display: flex; flex-direction: column; gap: 5px; }
    .oracle-logo { height: 22px; filter: brightness(0) invert(1); }
    .header-title { font-size: 24px; font-weight: 300; margin: 0; }

    .header-right { display: flex; align-items: center; gap: 20px; }
    .search-wrapper { position: relative; width: 280px; }
    .search-wrapper input { 
      width: 100%; padding: 10px 15px 10px 40px; 
      border-radius: 4px; border: none; outline: none; 
    }
    .search-icon { position: absolute; left: 12px; top: 12px; color: #888; }
    
    /* THE FIX: Highly Visible Login Icon */
    #user-trigger { 
      font-size: 32px; 
      cursor: pointer; 
      color: #ffffff; 
      text-shadow: 0 0 10px rgba(255,255,255,0.3);
      transition: transform 0.2s, color 0.2s;
    }
    #user-trigger:hover { transform: scale(1.1); color: #f0f0f0; }

    /* Accordion Styling */
    .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
    .card { background: white; border-radius: 8px; margin-bottom: 12px; border: 1px solid #ddd; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .card-header { 
      width: 100%; padding: 20px; display: flex; justify-content: space-between; 
      cursor: pointer; border: none; background: none; font-size: 17px; 
      font-weight: 600; color: var(--oracle-blue); text-align: left; 
    }
    .card-body { display: none; padding: 0 20px 20px 50px; background: #fafafa; border-top: 1px solid #eee; }

    /* Modals */
    .modal { 
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); 
      display: none; justify-content: center; align-items: center; z-index: 2000; 
    }
    .modal-content { background: white; padding: 40px; border-radius: 12px; width: 350px; position: relative; }
    .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; border: none; background: none; color: #999; }
    .input-group { margin-bottom: 15px; }
    .input-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; }
    .form-control { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    .btn-action { width: 100%; padding: 12px; background: var(--oracle-blue); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }

    #admin-toolbar { position: fixed; bottom: 20px; left: 20px; display: none; }
    .btn-floating { padding: 15px 25px; border-radius: 50px; background: #333; color: white; border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-weight: bold; }
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/50/Oracle_logo.svg" class="oracle-logo">
    <h1 class="header-title">How can we help you today?</h1>
  </div>
  <div class="header-right">
    <div class="search-wrapper">
      <i class="fas fa-search search-icon"></i>
      <input type="text" id="mainSearch" placeholder="Search...">
    </div>
    <i id="user-trigger" class="fas fa-user-circle" title="Admin Login"></i>
  </div>
</header>

<main class="container" id="accordion-root">
  <div class="card">
    <button class="card-header"><span>Working Instructions</span><i class="fas fa-chevron-down"></i></button>
    <div class="card-body" id="body-Working-Instructions"></div>
  </div>
  <div class="card">
    <button class="card-header"><span>Standard Operating Procedures</span><i class="fas fa-chevron-down"></i></button>
    <div class="card-body" id="body-Standard-Operating-Procedures"></div>
  </div>
  <div class="card">
    <button class="card-header"><span>Functional Specifications</span><i class="fas fa-chevron-down"></i></button>
    <div class="card-body" id="body-Functional-Specifications"></div>
  </div>
  <div class="card">
    <button class="card-header"><span>Templates</span><i class="fas fa-chevron-down"></i></button>
    <div class="card-body" id="body-Templates"></div>
  </div>
</main>

<div id="login-modal" class="modal">
  <div class="modal-content">
    <button class="close-btn">&times;</button>
    <div id="login-form">
      <h2 style="text-align:center; color:var(--oracle-blue)">Admin Login</h2>
      <div class="input-group"><input type="email" id="email" class="form-control" placeholder="Email"></div>
      <div class="input-group"><input type="password" id="password" class="form-control" placeholder="Password"></div>
      <button id="btn-login" class="btn-action">Sign In</button>
      <p id="err" style="color:red; font-size:12px; text-align:center; margin-top:10px;"></p>
    </div>
    <div id="admin-panel" style="display:none; text-align:center;">
      <h2 style="color:var(--oracle-blue)">Admin Active</h2>
      <p id="user-display" style="font-size:14px; color:#666;"></p>
      <button id="btn-logout" class="btn-action" style="background:#d9534f">Sign Out</button>
    </div>
  </div>
</div>

<div id="upload-modal" class="modal">
  <div class="modal-content">
    <button class="close-btn">&times;</button>
    <h3>Upload File</h3>
    <select id="up-cat" class="form-control" style="margin-bottom:10px">
      <option>Working Instructions</option>
      <option>Standard Operating Procedures</option>
      <option>Functional Specifications</option>
      <option>Templates</option>
    </select>
    <input type="text" id="up-sec" class="form-control" placeholder="Section Name (e.g. Receivables)" style="margin-bottom:10px">
    <input type="file" id="up-file" class="form-control" style="margin-bottom:10px">
    <button id="btn-upload" class="btn-action">Upload Now</button>
  </div>
</div>

<div id="admin-toolbar">
  <button class="btn-floating" onclick="document.getElementById('upload-modal').style.display='flex'">+ Add File</button>
</div>

<script>
  // 1. Firebase (Use your existing config)
  const firebaseConfig = {
    apiKey: "AIzaSyBaSuFhNUeghfXEznYCHxYnagkjiojfO_M",
    authDomain: "helpdeskrpharmacy.firebaseapp.com",
    databaseURL: "https://helpdeskrpharmacy-default-rtdb.firebaseio.com",
    projectId: "helpdeskrpharmacy",
    storageBucket: "helpdeskrpharmacy.appspot.com",
    messagingSenderId: "776189919696",
    appId: "1:776189919696:web:ab3be5e265dbfff8faf9d5"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth(), db = firebase.database(), storage = firebase.storage();

  // 2. UI Interaction
  const closeAll = () => document.querySelectorAll('.modal').forEach(m => m.style.display='none');
  document.querySelectorAll('.close-btn').forEach(b => b.onclick = closeAll);
  document.getElementById('user-trigger').onclick = () => document.getElementById('login-modal').style.display='flex';

  // 3. Auth Logic
  document.getElementById('btn-login').onclick = () => {
    auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value)
      .then(closeAll).catch(e => document.getElementById('err').innerText = e.message);
  };
  document.getElementById('btn-logout').onclick = () => auth.signOut().then(closeAll);

  auth.onAuthStateChanged(user => {
    document.getElementById('admin-toolbar').style.display = user ? 'block' : 'none';
    document.getElementById('login-form').style.display = user ? 'none' : 'block';
    document.getElementById('admin-panel').style.display = user ? 'block' : 'none';
    if(user) document.getElementById('user-display').innerText = user.email;
  });

  // 4. Upload Logic
  document.getElementById('btn-upload').onclick = () => {
    const file = document.getElementById('up-file').files[0], cat = document.getElementById('up-cat').value, sec = document.getElementById('up-sec').value;
    if(!file || !sec) return alert("Fill all fields");
    const ref = storage.ref('docs/' + Date.now() + "_" + file.name);
    ref.put(file).then(s => s.ref.getDownloadURL()).then(url => {
      db.ref('files').push({ category: cat, section: sec, name: file.name, url: url });
      alert("Success!"); closeAll();
    });
  };

  // 5. Data & Click Fix (Delegation)
  db.ref('files').on('value', snap => {
    document.querySelectorAll('.card-body').forEach(b => b.innerHTML = '');
    snap.forEach(c => {
      const d = c.val();
      const parent = document.getElementById('body-' + d.category.replace(/\s+/g, '-'));
      if(parent) {
        let sec = parent.querySelector(`[data-sec="${d.section}"]`);
        if(!sec) {
          sec = document.createElement('div');
          sec.setAttribute('data-sec', d.section);
          sec.innerHTML = `<div class="sec-h" style="font-weight:bold; padding:10px 0; cursor:pointer;">${d.section} <i class="fas fa-chevron-right" style="font-size:0.8em"></i></div><ul style="display:none; list-style:none; padding-left:15px;"></ul>`;
          parent.appendChild(sec);
        }
        const li = document.createElement('li');
        li.innerHTML = `<a href="${d.url}" target="_blank" style="text-decoration:none; color:#0056b3; font-size:14px; display:block; padding:5px 0;">📄 ${d.name}</a>`;
        sec.querySelector('ul').appendChild(li);
      }
    });
  });

  // THE 100% CLICK FIX
  document.getElementById('accordion-root').addEventListener('click', (e) => {
    const head = e.target.closest('.card-header');
    if(head) {
      const b = head.nextElementSibling;
      b.style.display = (b.style.display === 'block') ? 'none' : 'block';
      return;
    }
    const secH = e.target.closest('.sec-h');
    if(secH) {
      const u = secH.nextElementSibling;
      u.style.display = (u.style.display === 'block') ? 'none' : 'block';
    }
  });

  // 6. Search
  document.getElementById('mainSearch').onkeyup = function() {
    let q = this.value.toLowerCase();
    document.querySelectorAll('.card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(q) ? 'block' : 'none');
  };
</script>
</body>
</html>
